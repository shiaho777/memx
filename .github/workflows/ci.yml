# Delivery gate:
# - Branch protection should require this workflow's merge job on PRs into main.
# - Issues close via PR body Fixes #N / Closes #N on *merge*, not from this workflow.
# - Do not merge while this workflow is red; do not close the linked Issue early.
name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gate:
    name: gate
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build runtime and vessel
        run: make all

      - name: Core tests
        run: make test

      - name: Delivery policy summary
        if: always()
        run: |
          {
            echo "## MemX CI gate"
            echo ""
            echo "- Workflow: CI"
            echo "- Job id: gate"
            echo "- Merge gate only; does not close GitHub Issues."
            echo "- Issues close via PR body Fixes #N / Closes #N on merge."
          } >> "$GITHUB_STEP_SUMMARY"
